[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions."media-file"]
  timeout = 26

[functions."media-upload-complete"]
  timeout = 26

[functions."media-upload-chunk"]
  timeout = 26

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  framework = "#custom"
